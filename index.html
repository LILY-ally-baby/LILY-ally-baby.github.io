<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<title>LIYI Creative Portfolio</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    width:100%;
    height:100vh;

    overflow:hidden;

    background:#020817;

}


/* 背景 */

.background{

    position:absolute;

    inset:0;


    background-image:

    linear-gradient(

        to left,

        rgba(2,8,23,0) 0%,

        rgba(2,8,23,0.15) 25%,

        rgba(2,8,23,0.55) 55%,

        rgba(2,8,23,0.92) 85%,

        rgba(2,8,23,1) 100%

    ),

    url("leopard-bg.jpg");



    background-size:cover;


    background-position:center;


    transform:scale(1.05);


}




/* 增加夜色层次 */

.overlay{


    position:absolute;

    inset:0;


    background:


    radial-gradient(

        circle at 70% 45%,

        rgba(35,70,130,0.25),

        transparent 45%

    );


}



/* 页面主体 */


.container{


    position:relative;


    width:100%;

    height:100vh;


    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;


    color:white;


}



/* LOGO */


.logo{


    font-family:"Times New Roman",serif;


    font-size:105px;


    letter-spacing:28px;


    margin-left:28px;


    font-weight:300;


    text-shadow:


    0 0 35px rgba(255,255,255,.18);


}




.subtitle{


    margin-top:18px;


    font-family:"Times New Roman",serif;


    font-size:18px;


    letter-spacing:14px;


    color:rgba(255,255,255,.7);


}




/* 导航 */


.nav{


    position:absolute;


    bottom:95px;


    display:flex;


    gap:120px;


}




.nav a{


    font-family:"KaiTi","STKaiti","楷体",serif;


    font-size:18px;


    letter-spacing:7px;


    color:rgba(255,255,255,.88);


    text-decoration:none;


    transition:.5s;


}



/* 鼠标效果 */


.nav a:hover{


    color:white;


    transform:translateY(-8px);


    text-shadow:

    0 0 20px rgba(255,255,255,.5);


}



/* 底部 */


.footer{


    position:absolute;


    bottom:38px;


    font-family:"KaiTi","STKaiti",serif;


    font-size:14px;


    letter-spacing:10px;


    color:rgba(255,255,255,.45);


}



</style>


</head>



<body>



<div class="background"></div>


<div class="overlay"></div>



<div class="container">



<div class="logo">

LIYI

</div>



<div class="subtitle">

CREATIVE PORTFOLIO

</div>




<div class="nav">


<a href="#">

About Me

</a>


<a href="#">

Works

</a>


<a href="#">

Contact

</a>



</div>




<div class="footer">

Silence · Wildness · Creation

</div>



</div>




</body>


</html>
