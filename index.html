<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>LIYI Creative Portfolio</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html,body{

    width:100%;
    height:100%;

    overflow:hidden;

}


/* 整体背景 */

body{

    background:#020817;

    color:white;

    font-family:"Times New Roman",serif;

}



/* 豹子图片背景 */

.bg{


    position:fixed;

    top:0;
    left:0;


    width:100%;
    height:100%;



    background-image:


    linear-gradient(

    90deg,

    #020817 0%,

    rgba(2,8,23,.95) 18%,

    rgba(2,8,23,.55) 45%,

    rgba(2,8,23,.15) 75%,

    rgba(2,8,23,0) 100%

    ),


    url("leopard-bg.jpg");



    background-repeat:no-repeat;


    background-size:cover;


    background-position:center;



    z-index:-2;



}



/* 轻微蓝色氛围 */

.bg::after{


    content:"";

    position:absolute;

    inset:0;


    background:

    radial-gradient(

    circle at 75% 40%,

    rgba(45,90,180,.25),

    transparent 40%

    );


}



/* 主内容 */

.page{


    width:100%;

    height:100vh;


    display:flex;

    flex-direction:column;


    justify-content:center;

    align-items:center;



}



/* 名字 */


.name{


    font-size:110px;


    font-weight:300;


    letter-spacing:25px;


    margin-left:25px;


}



/* 副标题 */


.desc{


    margin-top:20px;


    font-size:18px;


    letter-spacing:15px;


    opacity:.75;


}



/* 三个链接 */


.menu{


    position:absolute;


    bottom:100px;



    display:flex;


    gap:120px;



}



.menu a{


    color:white;


    text-decoration:none;


    font-family:"KaiTi","STKaiti","楷体",serif;



    font-size:16px;



    letter-spacing:7px;



    opacity:.85;



    transition:.4s;


}



.menu a:hover{


    opacity:1;


    transform:translateY(-6px);


}



/* 底部文字 */


.footer{


    position:absolute;


    bottom:35px;


    font-family:"KaiTi","STKaiti",serif;


    font-size:14px;


    letter-spacing:10px;


    opacity:.5;


}


</style>


</head>



<body>



<div class="bg"></div>



<div class="page">


<div class="name">

LIYI

</div>



<div class="desc">

CREATIVE PORTFOLIO

</div>



<div class="menu">

<a href="#">About Me</a>

<a href="#">Works</a>

<a href="#">Contact</a>


</div>



<div class="footer">

Silence · Wildness · Creation

</div>



</div>



</body>

</html>
