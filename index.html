<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Liyi | Creative Portfolio</title>


<style>


/* ===== 全局 ===== */


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    min-height:100vh;

    overflow-x:hidden;

    color:#3b3833;

    font-family:
    "Noto Serif SC",
    "Songti SC",
    serif;


    background-color:#f8f5ee;


    /* 宣纸肌理 */

    background-image:

    radial-gradient(
    rgba(120,100,70,.08) 1px,
    transparent 1px
    ),

    radial-gradient(
    rgba(255,255,255,.8) 1px,
    transparent 1px
    );

    background-size:
    18px 18px,
    25px 25px;

}


/* ===== 自定义鼠标 ===== */


.cursor{

position:fixed;

width:35px;

height:35px;

border-radius:50%;

background:

rgba(224,145,145,.25);


pointer-events:none;

transform:translate(-50%,-50%);

z-index:999;


backdrop-filter:blur(5px);


transition:
width .3s,
height .3s;

}





/* ===== 首页 ===== */


.hero{


height:100vh;


display:flex;


align-items:center;


justify-content:center;


position:relative;


text-align:center;


}



/* ===== 顶部文字 ===== */


.intro{


position:absolute;

top:90px;


animation:fadeIn 2s ease;


}



.intro h1{


font-size:52px;

font-weight:400;


letter-spacing:8px;


}



.intro p{


margin-top:20px;

font-size:16px;

color:#81786d;

letter-spacing:3px;


}



/* ===== 牡丹 ===== */



.peony{


width:360px;


cursor:pointer;


animation:

float 5s infinite ease-in-out;


filter:

drop-shadow(
0 20px 30px
rgba(150,100,80,.15)
);


transition:.5s;


}



.peony:hover{


transform:

scale(1.08);


filter:

drop-shadow(
0 30px 50px
rgba(210,130,130,.35)
);


}





/* ===== 导航卡片 ===== */


.cards{


position:absolute;


bottom:80px;


display:flex;


gap:30px;


}



.card{


width:150px;

height:90px;


background:

rgba(255,255,255,.45);



border:

1px solid

rgba(160,140,120,.15);



border-radius:18px;


display:flex;

align-items:center;

justify-content:center;


font-size:15px;


letter-spacing:2px;


backdrop-filter:blur(10px);



transition:.4s;


cursor:pointer;



}




.card:hover{


transform:

translateY(-12px);



background:

rgba(255,255,255,.75);



box-shadow:

0 20px 40px
rgba(120,90,60,.12);



}





/* ===== 动画 ===== */


@keyframes float{


0%,100%{

transform:
translateY(0);

}


50%{

transform:
translateY(-18px);

}


}



@keyframes fadeIn{


from{

opacity:0;

transform:
translateY(30px);

}


to{

opacity:1;

transform:
translateY(0);

}

}




/* ===== 手机适配 ===== */


@media(max-width:700px){


.peony{

width:250px;

}


.intro h1{

font-size:36px;

}


.cards{

gap:10px;

bottom:40px;

}



.card{

width:100px;

height:70px;

font-size:12px;

}



}




</style>

</head>




<body>


<!-- 鼠标光点 -->

<div class="cursor"></div>




<section class="hero">



<div class="intro">

<h1>
Liyi
</h1>


<p>
Humanities × Design × AI
</p>


</div>



<!-- 牡丹图片 -->

<img

class="peony"

src="peony.png"

alt="Chinese Peony">


<div class="cards">


<div class="card">

About Me

</div>



<div class="card">

Works

</div>



<div class="card">

Contact

</div>


</div>



</section>





<script>


// 鼠标跟随


const cursor =
document.querySelector(".cursor");


document.addEventListener(
"mousemove",
(e)=>{


cursor.style.left =
e.clientX+"px";


cursor.style.top =
e.clientY+"px";


});





// 点击牡丹反馈


const peony =
document.querySelector(".peony");


peony.onclick=()=>{


peony.style.transform=
"scale(1.15)";


setTimeout(()=>{


peony.style.transform="";


},500)



}



</script>



</body>


</html>
