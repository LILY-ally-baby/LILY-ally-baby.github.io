<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>LIYI Creative Portfolio</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html,body{

    width:100%;
    height:100%;

    overflow:hidden;

}


body{

    background:#020817;

    color:white;

    font-family:
    "Times New Roman",
    serif;

    cursor:none;

}



/* =====================
   背景图片
===================== */


.bg{


    position:fixed;

    top:0;

    left:0;


    width:100%;

    height:100%;



    background-image:


    linear-gradient(

    90deg,

    #020817 0%,

    rgba(2,8,23,.95) 18%,

    rgba(2,8,23,.55) 45%,

    rgba(2,8,23,.15) 75%,

    rgba(2,8,23,0) 100%

    ),



    url("leopard-bg.jpg");



    background-repeat:no-repeat;


    background-size:cover;


    background-position:center;



    transform:scale(1.05);


    z-index:-2;


}




/* 蓝色氛围层 */


.bg::after{


    content:"";


    position:absolute;


    inset:0;


    background:


    radial-gradient(

    circle at 75% 40%,

    rgba(70,110,180,.22),

    transparent 45%

    );


}




/* =====================
   鼠标跟随光标
===================== */


.cursor{


    position:fixed;


    width:45px;


    height:45px;



    border-radius:50%;



    background:


    radial-gradient(

    circle,

    rgba(180,210,255,.45),

    rgba(120,160,220,.15),

    transparent 70%

    );



    pointer-events:none;



    transform:

    translate(-50%,-50%);



    z-index:999;



    backdrop-filter:blur(5px);



    transition:


    width .3s ease,

    height .3s ease;


}



.cursor.active{


    width:80px;


    height:80px;


}





/* =====================
   页面内容
===================== */


.page{


    width:100%;


    height:100vh;



    display:flex;


    flex-direction:column;



    justify-content:center;


    align-items:center;



}



/* 主标题 */


.name{


    font-size:110px;



    font-weight:300;



    letter-spacing:25px;



    margin-left:25px;



    text-shadow:


    0 0 35px rgba(255,255,255,.18);


}




/* 副标题 */


.desc{


    margin-top:20px;


    font-size:18px;



    letter-spacing:15px;



    opacity:.75;


}




/* =====================
   导航
===================== */


.menu{


    position:absolute;



    bottom:100px;



    display:flex;



    gap:200px;



}



.menu a{


    color:white;


    text-decoration:none;



    font-family:


    "KaiTi",

    "STKaiti",

    "楷体",

    serif;



    font-size:14px;



    letter-spacing:8px;



    opacity:.85;



    transition:.4s;


}



.menu a:hover{


    opacity:1;



    transform:

    translateY(-8px);



    text-shadow:


    0 0 20px rgba(255,255,255,.5);


}




/* 底部文字 */


.footer{


    position:absolute;



    bottom:35px;



    font-family:

    "KaiTi",

    "STKaiti",

    serif;



    font-size:14px;



    letter-spacing:10px;



    opacity:.5;



}




</style>

</head>




<body>


<!-- 鼠标光标 -->

<div class="cursor"></div>



<!-- 背景 -->

<div class="bg"></div>



<!-- 页面 -->

<div class="page">



<div class="name">

LIYI

</div>




<div class="desc">

CREATIVE PORTFOLIO

</div>





<div class="menu">


<a href="#">
<a href="about.html">
About Me
</a>
</a>


<a href="#">
Works
</a>


<a href="#">
Contact
</a>


</div>




<div class="footer">

Silence · Wildness · Creation

</div>



</div>






<script>


// 鼠标跟随


const cursor =
document.querySelector(".cursor");



document.addEventListener(
"mousemove",
(e)=>{


cursor.style.left =
e.clientX + "px";


cursor.style.top =
e.clientY + "px";


});





// 鼠标靠近文字放大


const links =
document.querySelectorAll(".menu a");



links.forEach(link=>{


link.addEventListener(
"mouseenter",
()=>{


cursor.classList.add("active");


});



link.addEventListener(
"mouseleave",
()=>{


cursor.classList.remove("active");


});


});



</script>



</body>


</html>
