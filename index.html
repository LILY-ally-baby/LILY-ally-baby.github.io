<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LILY Portfolio</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;
overflow:hidden;

font-family:
"Times New Roman",
"Noto Serif SC",
serif;


background:#020611;

color:white;

}



/* ===== 背景图片层 ===== */


.bg{


position:absolute;

inset:0;


background-image:

linear-gradient(
90deg,

#020611 0%,

rgba(2,6,17,.95) 18%,

rgba(2,6,17,.65) 38%,

rgba(2,6,17,.15) 70%,

rgba(2,6,17,0) 100%

),

url("leopard-bg.jpg");



background-size:cover;


background-position:center;


filter:
blur(1.5px);



transform:scale(1.05);


z-index:0;


}



/* 深蓝氛围 */


.dark-layer{


position:absolute;

inset:0;


background:

radial-gradient(

circle at 75% 45%,

rgba(50,100,180,.25),

transparent 35%

);


z-index:1;


}




/* 鼠标光 */


.cursor{


position:absolute;


width:260px;

height:260px;


border-radius:50%;


background:

radial-gradient(

circle,

rgba(150,190,255,.22),

transparent 70%

);


pointer-events:none;


transform:
translate(-50%,-50%);



z-index:5;


}



/* 主区域 */


.container{


position:relative;

z-index:3;


height:100vh;


display:flex;

align-items:center;

justify-content:center;


flex-direction:column;


}



/* 名字 */


.logo{


font-size:90px;


font-weight:300;


letter-spacing:25px;


margin-bottom:20px;



text-shadow:

0 0 40px rgba(255,255,255,.35);



}



.desc{


font-size:18px;


letter-spacing:10px;


opacity:.8;


}



/* 导航 */


.nav{


position:absolute;


bottom:100px;


display:flex;


gap:45px;


}



.item{


width:190px;


height:90px;



display:flex;


align-items:center;

justify-content:center;



border-radius:25px;


background:

rgba(255,255,255,.08);



border:

1px solid rgba(255,255,255,.25);



backdrop-filter:

blur(15px);



font-size:18px;


letter-spacing:5px;



transition:.5s;


}



.item:hover{


transform:

translateY(-15px);



background:

rgba(255,255,255,.18);



box-shadow:

0 20px 50px rgba(0,0,0,.5);


}



/* 底部 */


.bottom{


position:absolute;


bottom:35px;


font-size:14px;


letter-spacing:6px;


opacity:.5;


}



</style>

</head>



<body>



<div class="bg"></div>

<div class="dark-layer"></div>


<div class="cursor"></div>



<div class="container">


<div class="logo">

LILY

</div>


<div class="desc">

CREATIVE PORTFOLIO

</div>



<div class="nav">


<div class="item">
ABOUT ME
</div>


<div class="item">
WORKS
</div>


<div class="item">
CONTACT
</div>



</div>


<div class="bottom">

SILENCE · WILDNESS · CREATION

</div>



</div>



<script>


const cursor=document.querySelector(".cursor");


document.addEventListener(
"mousemove",
(e)=>{


cursor.style.left=e.clientX+"px";

cursor.style.top=e.clientY+"px";


}

);



</script>



</body>


</html>
