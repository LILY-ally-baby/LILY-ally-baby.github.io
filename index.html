<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lily Portfolio</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    height:100vh;
    overflow:hidden;

    font-family:
    "Times New Roman",
    "Noto Serif SC",
    serif;


    background:
    linear-gradient(
        90deg,
        #020611 0%,
        #07152b 45%,
        #0b1830 100%
    );


    color:white;

}


/* 背景图片 */

.background{


position:absolute;

right:0;

top:0;

width:75%;

height:100%;


background-image:

linear-gradient(
90deg,
rgba(2,6,17,1) 0%,
rgba(2,6,17,.7) 25%,
rgba(2,6,17,.15) 60%,
transparent 100%
),

url("leopard-bg.jpg");



background-size:cover;

background-position:center;



z-index:0;


}


/* 暗色覆盖 */

.overlay{


position:absolute;

inset:0;


background:

radial-gradient(
circle at 70% 40%,
rgba(100,130,180,.15),
transparent 40%
);


z-index:1;

}



/* 鼠标光晕 */

.cursor{


position:absolute;

width:220px;

height:220px;


border-radius:50%;


background:

radial-gradient(
circle,
rgba(150,180,255,.18),
transparent 70%
);


pointer-events:none;


transform:translate(-50%,-50%);


z-index:5;


}



/* 主内容 */


.container{


position:relative;

z-index:3;


height:100vh;


display:flex;


align-items:center;


justify-content:center;


flex-direction:column;


}




h1{


font-size:80px;


letter-spacing:15px;


font-weight:300;


margin-bottom:20px;


text-shadow:

0 0 30px rgba(255,255,255,.3);


}



.subtitle{


font-size:18px;


letter-spacing:8px;


opacity:.75;


}



/* 导航 */


.nav{


position:absolute;


bottom:80px;


display:flex;


gap:40px;


}



.card{


width:180px;

height:90px;


display:flex;


align-items:center;


justify-content:center;



background:

rgba(255,255,255,.08);



border:

1px solid rgba(255,255,255,.25);



backdrop-filter:blur(12px);



border-radius:20px;



font-size:18px;


letter-spacing:4px;



transition:.5s;


}



.card:hover{


transform:

translateY(-15px)
scale(1.05);



background:

rgba(255,255,255,.18);



box-shadow:

0 20px 50px rgba(0,0,0,.4);


}




/* 小文字 */


.quote{


position:absolute;


bottom:35px;


font-size:14px;


letter-spacing:5px;


opacity:.5;


}





</style>


</head>


<body>



<div class="background"></div>

<div class="overlay"></div>


<div class="cursor"></div>



<div class="container">


<h1>LILY</h1>


<div class="subtitle">

CREATIVE PORTFOLIO

</div>



<div class="nav">


<div class="card">
About Me
</div>


<div class="card">
Works
</div>


<div class="card">
Contact
</div>


</div>


<div class="quote">

Silence · Wildness · Creation

</div>



</div>





<script>


const cursor=document.querySelector(".cursor");


document.addEventListener(
"mousemove",
(e)=>{


cursor.style.left=e.clientX+"px";

cursor.style.top=e.clientY+"px";


}

);



</script>



</body>


</html>
