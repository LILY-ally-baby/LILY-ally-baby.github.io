<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<title>LIYI Creative Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#020817;
    font-family:"Times New Roman","Songti SC",serif;
}


/* 背景图片 */

.background{
    position:absolute;
    inset:0;

    background-image:
    linear-gradient(
        to left,
        rgba(2,8,23,0) 0%,
        rgba(2,8,23,0.25) 35%,
        rgba(2,8,23,0.8) 75%,
        rgba(2,8,23,1) 100%
    ),
    url(leopard-bg.jpg);

    background-size:cover;
    background-position:center;

    filter:none;

    transform:scale(1.03);

}


/* 增加整体暗夜质感 */

.overlay{

    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle at 70% 40%,
        rgba(40,70,130,0.25),
        transparent 40%
    );

}



/* 主内容 */

.container{

    position:relative;

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;

}


/* 标题 */

.logo{

    font-size:110px;

    letter-spacing:25px;

    font-weight:300;

    margin-left:25px;

    text-shadow:
    0 0 30px rgba(255,255,255,.2);

}


.subtitle{

    margin-top:20px;

    font-size:22px;

    letter-spacing:14px;

    color:rgba(255,255,255,.75);

}



/* 导航 */

.nav{

    position:absolute;

    bottom:90px;

    display:flex;

    gap:90px;

}


.nav a{

    color:white;

    text-decoration:none;

    font-size:22px;

    letter-spacing:8px;

    opacity:.85;

    transition:.4s;

}



.nav a:hover{

    opacity:1;

    transform:translateY(-8px);

}



/* 底部文字 */

.footer{

    position:absolute;

    bottom:35px;

    color:rgba(255,255,255,.55);

    letter-spacing:10px;

    font-size:14px;

}


</style>

</head>


<body>


<div class="background"></div>

<div class="overlay"></div>


<div class="container">


    <div class="logo">
        LIYI
    </div>


    <div class="subtitle">
        CREATIVE PORTFOLIO
    </div>



    <div class="nav">

        <a href="#">
            About Me
        </a>


        <a href="#">
            Works
        </a>


        <a href="#">
            Contact
        </a>


    </div>



    <div class="footer">

        Silence · Wildness · Creation

    </div>


</div>


</body>

</html>
