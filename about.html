<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>About Me</title>


<style>


@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');


*{

margin:0;
padding:0;
box-sizing:border-box;

}


body{


width:100%;
height:100vh;

overflow:hidden;

background:#06152f;

color:white;

cursor:none;

}




/* =====================
背景
===================== */


.background{


position:absolute;

inset:0;



background-image:url("tree-bg.jpg");



background-size:cover;



background-position:left center;



filter:

brightness(.65)
contrast(1.1);



mask-image:

linear-gradient(

90deg,

black 0%,

black 50%,

rgba(0,0,0,.7) 75%,

transparent 100%

);


}



.overlay{


position:absolute;

inset:0;


background:

linear-gradient(

90deg,

rgba(5,15,35,0)

20%,


rgba(5,15,35,.35)

50%,


#06152f

100%

);


}





/* =====================
ABOUT标题
===================== */


.title{


position:absolute;


left:13%;


top:50%;



transform:

translateY(-50%);



writing-mode:vertical-rl;



font-family:

"Ma Shan Zheng",

"STKaiti",

serif;



font-size:72px;



letter-spacing:18px;



line-height:1.3;



opacity:.9;



}






/* =====================
正文区域
===================== */


.content{


position:absolute;



left:45%;



top:50%;



transform:

translateY(-50%);



width:520px;



 } 
.subtitle{


position:absolute;


writing-mode:vertical-rl;



font-family:

"KaiTi",

"STKaiti",

serif;



font-size:12px;



letter-spacing:8px;



opacity:.65;



/* 在ABOUT ME后面偏移 */

left:90px;



/* 比ABOUT ME稍微低一点 */

top:80px;



}







}





.text{


font-family:

"KaiTi",

"STKaiti",

serif;



font-size:20px;



line-height:2.8;



letter-spacing:5px;



}




.text p{


margin-bottom:45px;



opacity:0;



transform:

translateY(30px);



animation:

fadeIn 2s forwards;



}





/* 第一段 */


.text p:nth-child(1){


animation-delay:0s;


}



/* 第二段 */


.text p:nth-child(2){


margin-left:4em;


animation-delay:2s;


}



/* 第三段 */


.text p:nth-child(3){


margin-left:8em;


animation-delay:4s;


}





/* 浮现 */


@keyframes fadeIn{


0%{


opacity:0;



transform:

translateY(30px);



}



100%{


opacity:1;



transform:

translateY(0);



}



}







/* =====================
鼠标
===================== */


.cursor{


position:fixed;


width:32px;


height:32px;


border-radius:50%;



background:

rgba(255,255,255,.35);



pointer-events:none;



transform:

translate(-50%,-50%);



z-index:999;



}



.cursor::after{


content:"";

position:absolute;

inset:0;


border-radius:50%;



background:

rgba(130,170,255,.25);



animation:

pulse 2s infinite;


}



@keyframes pulse{


from{

transform:scale(1);

opacity:.8;

}


to{

transform:scale(2);

opacity:0;

}


}



</style>


</head>




<body>



<div class="background"></div>

<div class="overlay"></div>




<div class="title">

ABOUT ME

</div>





<div class="content">



<div class="subtitle">

LIYI · CREATIVE PORTFOLIO

</div>



<div class="text">



<p>

我是一名关注品牌、消费者与文化关系的创意探索者。

</p>



<p>

通过观察社会情绪，
寻找人与品牌之间新的连接方式。

</p>



<p>

我相信设计不仅是视觉表达，
更是一种理解世界的方法。

</p>



</div>


</div>





<div class="cursor"></div>




<script>


const cursor=document.querySelector(".cursor");



document.addEventListener(
"mousemove",
(e)=>{


cursor.style.left=e.clientX+"px";


cursor.style.top=e.clientY+"px";


}

);



</script>



</body>


</html>
