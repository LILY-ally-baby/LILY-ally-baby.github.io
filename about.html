<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<title>About Me</title>

<style>


@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    width:100%;
    height:100vh;
    overflow:hidden;

    background:#06152f;

    color:white;

    cursor:none;

}



/* 背景区域 */

.background{


    position:absolute;

    left:0;
    top:0;

    width:100%;
    height:100%;


    background-image:url("tree-bg.jpg");

    background-size:cover;

    background-position:left center;


    filter:
    brightness(0.65)
    blur(0.5px);



    /*
    图片右侧渐变消失
    */

    mask-image:

    linear-gradient(
        to right,
        black 0%,
        black 45%,
        transparent 90%
    );


}



/* 右侧蓝色融合层 */

.overlay{


position:absolute;

width:100%;
height:100%;


background:

linear-gradient(

90deg,

rgba(5,15,35,0)

20%,

rgba(5,15,35,0.7)

65%,

#06152f

100%

);


}



/* 氛围玻璃雾 */

.glass{


position:absolute;

width:100%;
height:100%;


backdrop-filter:

blur(2px);


background:

rgba(10,20,45,0.15);



}




/* 内容区域 */

.content{


position:absolute;

right:12%;

top:15%;


width:520px;


}



/* 标题 */


.title{


writing-mode:vertical-rl;


font-family:
"Ma Shan Zheng",
cursive;


font-size:72px;


letter-spacing:15px;


line-height:1.5;


}



.subtitle{


margin-top:30px;

font-family:serif;

letter-spacing:8px;

font-size:15px;

opacity:.8;


}



/* 正文 */


.text{


margin-top:70px;


font-family:"KaiTi","STKaiti",serif;


font-size:22px;


line-height:2.4;


letter-spacing:4px;


}



/* 三段递进 */


.text p:nth-child(1){

margin-left:0;

}



.text p:nth-child(2){

margin-left:4em;

}



.text p:nth-child(3){

margin-left:8em;

}



/* 鼠标 */

.cursor{


position:fixed;

width:30px;

height:30px;


border-radius:50%;


background:

rgba(255,255,255,0.35);


backdrop-filter:blur(8px);


pointer-events:none;


transform:translate(-50%,-50%);


z-index:10;


transition:.15s;


}




</style>


</head>



<body>


<div class="background"></div>

<div class="overlay"></div>

<div class="glass"></div>



<div class="content">


<div class="title">

ABOUT ME

</div>



<div class="subtitle">

LIYI · CREATIVE PORTFOLIO

</div>



<div class="text">


<p>
我是一名关注品牌、消费者与文化关系的创意探索者。
</p>


<p>
通过观察社会情绪，
寻找人与品牌之间新的连接方式。
</p>


<p>
我相信设计不仅是视觉表达，
更是一种理解世界的方法。
</p>


</div>



</div>



<div class="cursor"></div>



<script>


const cursor=document.querySelector(".cursor");


document.addEventListener(
"mousemove",
(e)=>{


cursor.style.left=e.clientX+"px";

cursor.style.top=e.clientY+"px";


}

);



document.addEventListener(
"mousedown",
()=>{


cursor.style.width="45px";

cursor.style.height="45px";


}

);



document.addEventListener(
"mouseup",
()=>{


cursor.style.width="30px";

cursor.style.height="30px";


}

);



</script>


</body>


</html>
