<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>About Me</title>


<style>


@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');


*{

margin:0;
padding:0;
box-sizing:border-box;

}


body{


width:100%;
height:100vh;


overflow:hidden;


background:#06152f;


color:white;


cursor:none;


}




/* =====================
背景图片
===================== */


.background{


position:absolute;


left:0;

top:0;


width:100%;

height:100%;



background-image:url("tree-bg.jpg");



background-size:cover;



background-position:left center;



filter:

brightness(0.65)
contrast(1.1);



/* 图片向右自然消失 */


mask-image:


linear-gradient(

90deg,

black 0%,


black 50%,


rgba(0,0,0,0.75) 70%,


transparent 100%


);



}



/* =====================
颜色融合
===================== */


.overlay{


position:absolute;


width:100%;

height:100%;



background:


linear-gradient(

90deg,


rgba(4,15,35,0)

20%,


rgba(5,18,40,0.25)

45%,


rgba(6,18,45,0.75)

75%,


#06152f

100%


);



}






/* =====================
文字区域
===================== */


.content{


position:absolute;



right:12%;



top:16%;



width:600px;



}




/* =====================
ABOUT ME标题
===================== */


.title{


font-family:


"Ma Shan Zheng",

"STKaiti",

serif;



font-size:72px;



letter-spacing:18px;



line-height:1.2;



margin-bottom:35px;



}



.subtitle{


font-family:serif;



font-size:15px;



letter-spacing:10px;



opacity:0.75;



margin-bottom:65px;



}






/* =====================
正文
===================== */


.text{


font-family:


"KaiTi",

"STKaiti",

serif;



font-size:18px;



line-height:2.8;



letter-spacing:5px;



color:

rgba(255,255,255,0.9);



}



/* 段落错落 */


.text p{


margin-bottom:45px;



}




.text p:nth-child(1){


margin-left:0;



width:430px;



}




.text p:nth-child(2){


margin-left:4em;



width:390px;



}




.text p:nth-child(3){


margin-left:8em;



width:360px;



}







/* =====================
鼠标跟随
===================== */


.cursor{


position:fixed;



width:30px;



height:30px;



border-radius:50%;



background:

rgba(255,255,255,0.35);



pointer-events:none;



transform:

translate(-50%,-50%);



z-index:999;



transition:

0.2s;



}



.cursor::after{


content:"";



position:absolute;



left:0;

top:0;



width:100%;

height:100%;



border-radius:50%;



background:

rgba(120,160,255,0.25);



animation:pulse 2s infinite;



}




@keyframes pulse{


0%{


transform:scale(1);



opacity:.8;



}


100%{


transform:scale(2.2);



opacity:0;



}



}




</style>


</head>



<body>



<!-- 背景 -->

<div class="background"></div>


<div class="overlay"></div>





<!-- 内容 -->


<div class="content">



<div class="title">

ABOUT ME

</div>




<div class="subtitle">

LIYI · CREATIVE PORTFOLIO

</div>




<div class="text">


<p>

我是一名关注品牌、消费者与文化关系的创意探索者。

</p>



<p>

通过观察社会情绪，
寻找人与品牌之间新的连接方式。

</p>



<p>

我相信设计不仅是视觉表达，
更是一种理解世界的方法。

</p>



</div>




</div>





<!-- 鼠标 -->

<div class="cursor"></div>





<script>



const cursor=document.querySelector(".cursor");



document.addEventListener(
"mousemove",
(e)=>{


cursor.style.left=e.clientX+"px";


cursor.style.top=e.clientY+"px";



});





document.addEventListener(
"mousedown",
()=>{


cursor.style.width="45px";


cursor.style.height="45px";


});





document.addEventListener(
"mouseup",
()=>{


cursor.style.width="30px";


cursor.style.height="30px";


});




</script>



</body>


</html>
